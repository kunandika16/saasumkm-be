name: Deploy to Dev Server

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_KEY_SAASUMKM }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 43.133.34.210 >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key ubuntu@43.133.34.210 "bash /home/ubuntu/deploy-saasumkm.sh"
