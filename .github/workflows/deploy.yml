name: Deploy to Dev Server

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY_SAASUMKM }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan 43.133.34.210 >> ~/.ssh/known_hosts

      - name: Run deploy
        run: |
          ssh ubuntu@43.133.34.210 "bash /home/ubuntu/deploy-saasumkm.sh"
